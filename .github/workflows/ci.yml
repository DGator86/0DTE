name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Unit tests
        run: python -m pytest tests/ -v

      - name: Engine smoke test (synthetic chain, no API key)
        run: python spy0dte.py

      - name: MC smoke test
        run: python mc.py

      - name: Journal smoke test
        run: python journal.py
