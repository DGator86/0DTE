name: Deploy to VPS

# Push-to-deploy for the Hostinger VPS. On a push to main (or a manual run) this
# SSHes into the box and runs deploy/remote-deploy.sh, which fast-forwards the
# checkout under /opt/zerodte and restarts the zerodte-shadow systemd service.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VPS_HOST         the VPS IP address or hostname
#   VPS_SSH_KEY      the PRIVATE deploy key (the matching public key is in the
#                    VPS user's ~/.ssh/authorized_keys)
# Optional secrets:
#   VPS_USER         SSH user (default: root)
#   VPS_SSH_PORT     SSH port (default: 22)
#   VPS_KNOWN_HOSTS  pinned host key line(s) from `ssh-keyscan <host>`. If unset,
#                    the host key is scanned at deploy time (trust-on-first-use).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy on the VPS (branch, tag, or SHA)"
        required: false
        default: main

# Never let two deploys race against the same box.
concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::VPS_HOST and VPS_SSH_KEY secrets must be set." >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          port="${VPS_SSH_PORT:-22}"
          if [ -n "$VPS_KNOWN_HOSTS" ]; then
            printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            echo "::warning::VPS_KNOWN_HOSTS not set — scanning host key (trust-on-first-use)."
            ssh-keyscan -p "$port" -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          DEPLOY_REF: ${{ github.event.inputs.ref || github.sha }}
        run: |
          user="${VPS_USER:-root}"
          port="${VPS_SSH_PORT:-22}"
          echo "Deploying ref '$DEPLOY_REF' to $user@$VPS_HOST:$port"
          ssh -i ~/.ssh/id_deploy -p "$port" \
              -o ConnectTimeout=20 -o ServerAliveInterval=15 \
              "$user@$VPS_HOST" \
              "DEPLOY_REF='$DEPLOY_REF' bash -s" < deploy/remote-deploy.sh
